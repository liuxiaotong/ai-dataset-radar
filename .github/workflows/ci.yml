name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ai-dataset-radar-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: |
          env \
            -u GITHUB_TOKEN \
            -u GH_TOKEN \
            -u LLM_API_KEY \
            -u LLM_BASE_URL \
            -u LLM_MODEL \
            -u LLM_PROVIDER \
            -u SENTINEL_CODEX_API_KEY \
            -u ANTHROPIC_API_KEY \
            -u ANTHROPIC_BASE_URL \
            uv run ruff check src tests mcp_server agent

      - name: Pytest
        run: |
          env \
            -u GITHUB_TOKEN \
            -u GH_TOKEN \
            -u LLM_API_KEY \
            -u LLM_BASE_URL \
            -u LLM_MODEL \
            -u LLM_PROVIDER \
            -u SENTINEL_CODEX_API_KEY \
            -u ANTHROPIC_API_KEY \
            -u ANTHROPIC_BASE_URL \
            uv run pytest -q \
              --deselect tests/test_llm_client.py::TestOpenAICompatibleProvider::test_basic_call
